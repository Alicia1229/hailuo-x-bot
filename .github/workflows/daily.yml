# GitHub Actions：每天 UTC 时间一个固定点跑一次（每天 19:00 Asia/Shanghai = 11:00 UTC）
# 把这个 repo 推到 GitHub（私有仓库即可）后就会自动生效；电脑关机也不影响。
# Secrets 里需要配：
#   FEISHU_WEBHOOK_URL
#   FEISHU_SECRET (可选)
#   X_AUTH_TOKEN   (auth_token cookie)
#   X_CT0          (ct0 cookie)
#   X_USERNAME     (你的 X handle，不带 @)
name: daily-x-report

on:
  schedule:
    - cron: "0 11 * * *"   # 19:00 Asia/Shanghai = 11:00 UTC
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: write           # 让 workflow 能 commit + push docs/

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true   # 让 GITHUB_TOKEN 能 push
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Register X account
        run: |
          python scripts/register_x_account.py \
            --username "${{ secrets.X_USERNAME }}" \
            "${{ secrets.X_AUTH_TOKEN }}" \
            "${{ secrets.X_CT0 }}"
      - name: Push
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET:      ${{ secrets.FEISHU_SECRET }}
          TZ: Asia/Shanghai
          KEYWORDS: "hailuo03,hailuo3,hailuo,hailuoai,MiniMax Video,MiniMax H3"
          PAGES_BASE_URL: "https://Alicia1229.github.io/hailuo-x-bot"
        run: python -m src.main --once
      - name: Publish full report to GitHub Pages
        run: |
          if [ -d docs/reports ]; then
            git config user.name "hailuo-bot[bot]"
            git config user.email "bot@example.com"
            git add docs/reports/
            if git diff --cached --quiet; then
              echo "无新报告,跳过 commit"
            else
              git commit -m "docs: daily report $(date -u +%Y-%m-%d)"
              git push
            fi
          fi
