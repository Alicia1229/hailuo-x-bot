# GitHub Actions：每天 UTC 时间一个固定点跑一次（每天 17:00 Asia/Shanghai = 09:00 UTC）
# 仓库启用 GitHub Pages 后自动生效；电脑关机也不影响。
# Secrets 里需要配：
#   FEISHU_WEBHOOK_URL
#   FEISHU_SECRET (可选)
#   X_AUTH_TOKEN   (auth_token cookie)
#   X_CT0          (ct0 cookie)
#   X_USERNAME     (你的 X handle，不带 @)
#   OPENAI_API_KEY (可选，用于 AI 风险判定)
#   OPENAI_BASE_URL (可选，Mafia 平台填 https://api.appintheloop.com/v1)
#   RISK_MODEL     (可选，Mafia 平台可填 hy-4.1-mini / hy-4o-mini 等)
name: daily-x-report

on:
  schedule:
    - cron: "0 9 * * *"    # 17:00 Asia/Shanghai = 09:00 UTC
  workflow_dispatch:        # 允许手动触发

concurrency:
  group: daily-x-report
  cancel-in-progress: true

permissions:
  contents: write           # 让 workflow 能 commit + push docs/

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TZ: Asia/Shanghai
      PUSH_HOUR: "17"
      PUSH_MINUTE: "0"
      KEYWORDS: "hailuo03,hailuo3,hailuo,hailuoai,MiniMax Video,MiniMax H3"
      COMPETITOR_KEYWORDS: "Seedance,Dreamina,Kling,Vidu,Pika,Runway,Happy Horse,Higgsfield"
      LOOKBACK_HOURS: "24"
      MAX_HAILUO_TWEETS: "-1"
      MAX_PER_QUERY: "-1"
      PAGES_BASE_URL: "https://Alicia1229.github.io/hailuo-x-bot"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true   # 让 GITHUB_TOKEN 能 push
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Register X account
        env:
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: python scripts/register_x_account.py
      - name: Prepare Hailuo report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          RISK_MODEL: ${{ secrets.RISK_MODEL || 'gpt-5-mini' }}
        run: python -m src.main --once --prepare-only
      - name: Publish full report to GitHub Pages
        run: |
          if [ -d docs/reports ]; then
            git config user.name "hailuo-bot[bot]"
            git config user.email "bot@example.com"
            git add docs/reports/
            if git diff --cached --quiet; then
              echo "无新报告,跳过 commit"
            else
              git commit -m "docs: daily report $(date -u +%Y-%m-%d)"
              git push
            fi
          fi
      - name: Wait for GitHub Pages
        run: python scripts/wait_for_report.py cache/latest_report_path.txt
      - name: Send Hailuo Feishu card
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: python -m src.main --send-report cache/latest_report_path.txt
      - name: Send competitor Feishu card
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: python -m src.main --send-competitor-report cache/latest_report_path.txt
      - name: Notify workflow failure
        if: ${{ failure() }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: python scripts/notify_workflow_failure.py
